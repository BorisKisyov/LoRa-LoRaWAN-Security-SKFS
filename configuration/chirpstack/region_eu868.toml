[[regions]]
  name="eu868"
  common_name="EU868"

  [regions.gateway]
    force_gws_private=false

    [regions.gateway.backend]
      enabled="mqtt"

      [regions.gateway.backend.mqtt]
        event_topic="eu868/gateway/+/event/+"
        command_topic="eu868/gateway/{{ gateway_id }}/command/{{ command }}"
        server="tcp://chirpstack-mosquitto:1883"
        username=""
        password=""
        qos=0
        clean_session=true
        client_id=""

  [regions.network]
    installation_margin=10
    rx_window=0
    rx1_delay=1
    rx1_dr_offset=0
    rx2_dr=0
    rx2_frequency=869525000
    downlink_tx_power=-1
    adr_disabled=false
    min_dr=0
    max_dr=5

    [regions.network.rejoin_request]
      enabled=false
      max_count_n=0
      max_time_n=0
