services:
  vb-db:
    image: timescale/timescaledb:latest-pg15
    pull_policy: always
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-visionbyte}
    ports:
      - "5433:5432"
    volumes:
      - vb_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-visionbyte}"]
      interval: 10s
      timeout: 5s
      retries: 15

  vb-pgadmin:
    build:
      context: ./pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@skfs.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGPASS_FILE: /pgpass
    ports:
      - "5050:80"
    volumes:
      - vb_pgadmin:/var/lib/pgadmin
    depends_on:
      - vb-db

  chirpstack-mosquitto:
    image: eclipse-mosquitto:2
    pull_policy: always
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./configuration/mosquitto/config:/mosquitto/config:ro

  vb-api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@vb-db:5432/${POSTGRES_DB:-visionbyte}
      CHIRPSTACK_MQTT_ENABLED: "true"
      CHIRPSTACK_MQTT_HOST: chirpstack-mosquitto
      CHIRPSTACK_MQTT_PORT: "1883"
      CHIRPSTACK_MQTT_TOPIC: application/+/device/+/event/+
      DEFAULT_SITE_NAME: ChirpStack Lab
    ports:
      - "8000:8000"
    depends_on:
      vb-db:
        condition: service_healthy
      chirpstack-mosquitto:
        condition: service_started

  demo-seeder:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@vb-db:5432/${POSTGRES_DB:-visionbyte}
      CHIRPSTACK_MQTT_ENABLED: "false"
    command: ["python", "-m", "app.seed_demo"]
    restart: "no"
    depends_on:
      vb-db:
        condition: service_healthy

  demo-publisher:
    build:
      context: ./demo-publisher
    restart: unless-stopped
    environment:
      MQTT_HOST: chirpstack-mosquitto
      MQTT_PORT: "1883"
      API_BASE: http://vb-api:8000
      DEMO_DEVICE_COUNT: "5"
      DEMO_PUBLISH_INTERVAL: "30"
      DEMO_SITE_NAME: Demo Site
      DEMO_TENANT_NAME: Demo Tenant
      DEMO_APPLICATION_NAME: Demo Application
      DEMO_GATEWAY_ID: demo-gateway-0001
      DEMO_ATTACKS_ENABLED: "true"
      DEMO_ATTACK_EVERY_N_BATCHES: "4"
      DEMO_STATUS_EVERY_N_BATCHES: "2"
      DEMO_ACK_EVERY_N_BATCHES: "3"
      DEMO_STARTUP_DELAY: "10"
      DEMO_API_WAIT_TIMEOUT: "180"
      DEMO_MQTT_WAIT_TIMEOUT: "180"
    depends_on:
      chirpstack-mosquitto:
        condition: service_started
      vb-api:
        condition: service_started
      demo-seeder:
        condition: service_completed_successfully

  vb-web:
    build:
      context: ./web
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://vb-api:8000
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "127.0.0.1:8081:3000"
    depends_on:
      - vb-api

  chirpstack-postgres:
    image: postgres:14-alpine
    pull_policy: always
    restart: unless-stopped
    profiles: ["full-lorawan"]
    environment:
      POSTGRES_USER: chirpstack
      POSTGRES_PASSWORD: chirpstack
      POSTGRES_DB: chirpstack
    volumes:
      - chirpstack_postgres:/var/lib/postgresql/data
      - ./configuration/postgresql/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chirpstack -d chirpstack"]
      interval: 10s
      timeout: 5s
      retries: 15

  chirpstack-redis:
    image: redis:7-alpine
    pull_policy: always
    restart: unless-stopped
    profiles: ["full-lorawan"]
    command: redis-server --save 300 1 --save 60 100 --appendonly no
    volumes:
      - chirpstack_redis:/data

  chirpstack:
    image: chirpstack/chirpstack:4
    pull_policy: always
    restart: unless-stopped
    profiles: ["full-lorawan"]
    command: --config /etc/chirpstack
    environment:
      MQTT_BROKER_HOST: chirpstack-mosquitto
      REDIS_HOST: chirpstack-redis
      POSTGRESQL_HOST: chirpstack-postgres
    ports:
      - "8080:8080"
    volumes:
      - ./configuration/chirpstack:/etc/chirpstack:ro
    depends_on:
      chirpstack-postgres:
        condition: service_healthy
      chirpstack-redis:
        condition: service_started
      chirpstack-mosquitto:
        condition: service_started

  chirpstack-rest-api:
    image: chirpstack/chirpstack-rest-api:4
    pull_policy: always
    restart: unless-stopped
    profiles: ["full-lorawan"]
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure --cors "*"
    ports:
      - "8090:8090"
    depends_on:
      - chirpstack

  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    pull_policy: always
    restart: unless-stopped
    profiles: ["full-lorawan"]
    ports:
      - "1700:1700/udp"
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge:ro
    depends_on:
      - chirpstack-mosquitto

  chirpstack-simulator:
    build:
      context: ./simulator
    restart: unless-stopped
    profiles: ["full-lorawan"]
    environment:
      CHIRPSTACK_API_KEY: ${CHIRPSTACK_API_KEY:-}
      CHIRPSTACK_TENANT_ID: ${CHIRPSTACK_TENANT_ID:-}
      SIM_DEVICE_COUNT: ${SIM_DEVICE_COUNT:-5}
      SIM_DURATION: ${SIM_DURATION:-0s}
      SIM_UPLINK_INTERVAL: ${SIM_UPLINK_INTERVAL:-30s}
      SIM_PAYLOAD_HEX: ${SIM_PAYLOAD_HEX:-03E807D2320CE4}
    depends_on:
      - chirpstack
      - chirpstack-rest-api
      - chirpstack-gateway-bridge

volumes:
  vb_db:
  vb_pgadmin:
  chirpstack_postgres:
  chirpstack_redis:


